url: https://lf-araujo.github.io/fastsemR/

template:
  bootstrap: 5

# Home sidebar (matches the BGmisc / r-lib default layout).
# pkgdown 2.x will only render each block when the underlying source
# exists: `links` reads DESCRIPTION URL/BugReports, `community` is
# auto-built from CONTRIBUTING.md / CODE_OF_CONDUCT.md / SUPPORT.md
# at the repo root, `citation` reads inst/CITATION or the README's
# "Citation" h2, `license` reads DESCRIPTION License, `authors` reads
# DESCRIPTION Authors@R, and `dev` shows the development badge when
# the version sorts before a release.
home:
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  # Portuguese (pt) is the default language; Chinese (zh) is secondary;
  # English (en) is the canonical / fallback reference.  Each dropdown
  # points at parallel article sets under vignettes/articles/ with
  # _pt.Rmd / _zh.Rmd suffixes; the unsuffixed *.Rmd files are the
  # English canonical sources (and also the R vignettes).
  structure:
    left:  [reference, pt, zh, en, news]
    right: [search, github]
  components:
    zh:
      text: "中文"
      menu:
      - text: "教程"
      - text: 入门指南
        href: articles/getting-started_zh.html
      - text: 行为遗传学
        href: articles/behavior-genetics_zh.html
      - text: 状态空间模型
        href: articles/state-space-models_zh.html
      - text: -------
      - text: "关于 fastsem"
      - text: 与其他 SEM 软件的比较
        href: articles/comparison_zh.html
      - text: 性能基准
        href: articles/benchmarks_zh.html
      - text: 路线图
        href: articles/roadmap_zh.html
    pt:
      text: "Português"
      menu:
      - text: "Tutoriais"
      - text: Começando
        href: articles/getting-started_pt.html
      - text: Genética comportamental
        href: articles/behavior-genetics_pt.html
      - text: Modelos de espaço de estados
        href: articles/state-space-models_pt.html
      - text: -------
      - text: "Sobre o fastsem"
      - text: Comparação com outros softwares SEM
        href: articles/comparison_pt.html
      - text: Benchmarks de desempenho
        href: articles/benchmarks_pt.html
      - text: Roteiro
        href: articles/roadmap_pt.html
    en:
      text: "English"
      menu:
      - text: "Tutorials"
      - text: Getting started
        href: articles/getting-started.html
      - text: Behaviour genetics
        href: articles/behavior-genetics.html
      - text: State-space models
        href: articles/state-space-models.html
      - text: -------
      - text: "About fastsem"
      - text: Comparison with other SEM software
        href: articles/comparison.html
      - text: Benchmarks
        href: articles/benchmarks.html
      - text: Roadmap
        href: articles/roadmap.html

reference:
- title: "Fitting models from lavaan syntax"
  desc: "Fit fastsem models directly from lavaan-style syntax."
  contents:
  - fastsem_fit
  - fastsem_sem_vars
  - print_fastsem

- title: "umx / OpenMx bridge"
  desc: "Translate umx / OpenMx RAM models and inject estimates back."
  contents:
  - run_fastsem
  - run_fastsem_ram
  - umx_to_lavaan
  - umx_to_fastsem

- title: "Library management"
  desc: "Download, update, and load the compiled fastsem shared library."
  contents:
  - fastsem_install
  - fastsem_update
  - fastsem_load

articles:
# Language-grouped index used by the auto-generated "Articles" listing.
# Portuguese first (default language), Chinese second, English last.
# (The navbar dropdowns above are what most visitors will click.)
- title: Tutoriais em português
  navbar: ~
  contents:
  - articles/getting-started_pt
  - articles/behavior-genetics_pt
  - articles/state-space-models_pt
  - articles/comparison_pt
  - articles/benchmarks_pt
  - articles/roadmap_pt
- title: 中文教程
  contents:
  - articles/getting-started_zh
  - articles/behavior-genetics_zh
  - articles/state-space-models_zh
  - articles/comparison_zh
  - articles/benchmarks_zh
  - articles/roadmap_zh
- title: English tutorials
  contents:
  - getting-started
  - behavior-genetics
  - state-space-models
- title: About fastsem (English)
  desc: >
    Background on the fastsem engine — how it compares to other SEM
    software, performance numbers, and what is coming next.
  contents:
  - articles/comparison
  - articles/benchmarks
  - articles/roadmap
