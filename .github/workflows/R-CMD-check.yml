name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'devel'   }
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # The compiled fastsem shared library dlopens libOpenCL at load
      # time.  Install just the ICD loader stub on each platform so
      # `library(fastsemR)` succeeds during the install/check step
      # (no GPU/driver is required — kernels are never invoked here).
      - name: Install OpenCL ICD loader (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-libopencl1

      - name: Install OpenCL ICD loader (macOS)
        if: runner.os == 'macOS'
        run: echo "macOS ships OpenCL.framework; nothing to install."

      - name: Install OpenCL ICD loader (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Windows runners ship OpenCL.dll under System32 already.
          if (-not (Test-Path "$env:SystemRoot\System32\OpenCL.dll")) {
            Write-Error "OpenCL.dll not found on Windows runner"
            exit 1
          }

      # Install OpenMx from its own repo (not on CRAN)
      - name: Install OpenMx
        shell: Rscript {0}
        run: |
          if (!requireNamespace("OpenMx", quietly = TRUE)) {
            source("https://vsp.uoregon.edu/svn/OpenMx/trunk/inst/tools/install.OpenMx.R")
          }

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: '"--no-manual"'
