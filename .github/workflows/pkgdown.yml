# Build the pkgdown site and deploy it to GitHub Pages via the
# official Actions-based deployment (no `gh-pages` branch required).
#
# Repository setup:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
name: pkgdown
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

# Allow only one concurrent deployment, but do not cancel in-progress
# runs since we want to let production deployments finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # fastsem's .so does two things at load time:
      #  1. dlopen("libOpenCL.so") — needs the unversioned symlink from
      #     `ocl-icd-opencl-dev` (runtime pkg only ships libOpenCL.so.1).
      #  2. clGetPlatformIDs / firstPlatform — needs at least one
      #     registered ICD or it raises EOpenCL.  POCL (Portable
      #     Computing Language) is a CPU-only ICD that works on a
      #     headless runner without any GPU driver.
      - name: Install OpenCL ICD loader and POCL platform
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev pocl-opencl-icd

      - name: Install OpenMx
        shell: Rscript {0}
        run: install.packages("OpenMx")

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write       # to deploy to GitHub Pages
      id-token: write    # to verify deployment origin
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
